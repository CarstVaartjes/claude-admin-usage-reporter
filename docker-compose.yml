services:
  reporter:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./pricing_overrides.yaml:/app/pricing_overrides.yaml:ro
    # Fetch once at startup, then serve. Re-run `docker compose exec reporter python -m app.cli refresh`
    # (or hit the "Refresh from Admin API" button in the dashboard) to pull new data later.
    command: >
      sh -c "python -m app.cli refresh && python -m app.cli serve --host 0.0.0.0 --port 8000"
